; OpenTroll — PlatformIO configuration
; Native unit tests (no hardware required)
; ESP32 targets for real hardware deployment

[platformio]
default_envs = native

; ===== Native unit tests (run on your computer) =====
[env:native]
platform = native
build_flags = 
    -std=c++17
    -DUNITY_INCLUDE_DOUBLE
    -DNATIVE_TEST
lib_deps = 
test_build_src = yes

; ===== Pod 2 — ESP32 (motor brain) =====
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DARDUINO_ESP32
lib_deps = 

; ===== Pod 1 — ESP32-C3 (controller) =====
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags = -DARDUINO_ESP32C3
lib_deps = 
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
